<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHARIOT OF THE ANCIENTS: ARCADE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #33ff33; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; }
        canvas { background: #000; display: block; width: 100%; height: 100%; }
        .crt-overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); 
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 10; 
        }
        .ui { position: absolute; z-index: 20; text-align: center; color: #33ff33; pointer-events: none; }
    </style>
</head>
<body>
    <div class="crt-overlay"></div>
    <div id="ui" class="ui">
        <h1 class="text-4xl font-bold uppercase mb-4">Chariot of the Ancients</h1>
        <p class="text-xl animate-pulse">PRESS [ENTER] TO START</p>
        <p class="text-lg mt-4">JUMP OVER OBSTACLES WITH [SPACE]</p>
    </div>
    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        
        let gameState = 'ATTRACT'; 
        let playerY = 300;
        let vy = 0;
        const GROUND = 300;
        const GRAVITY = 1.2;
        const JUMP_FORCE = -18;
        let score = 0;
        let obstacles = [];
        let frame = 0;

        // Flipped Hero: Greek Charioteer facing left
        const HERO = ["  _O_  ", "  \\|/  ", " _/ \\_ "];
        const DRAGON = [" <^> ", "(o) "];
        const TEMPLE = [" /\\ ", "|__|"];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            playerY = canvas.height - 150;
        }
        window.onresize = resize;
        resize();

        function drawAscii(art, x, y) {
            ctx.fillStyle = "#33ff33";
            ctx.font = '20px Courier New';
            art.forEach((line, i) => ctx.fillText(line, x, y + (i * 20)));
        }

        function update() {
            if (gameState !== 'PLAYING') return;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Physics
            vy += GRAVITY;
            playerY += vy;
            if (playerY > canvas.height - 150) {
                playerY = canvas.height - 150;
                vy = 0;
            }

            // Obstacle spawning
            if (frame % 80 === 0) {
                obstacles.push({ x: canvas.width, y: canvas.height - 150, type: Math.random() > 0.5 ? DRAGON : TEMPLE });
            }

            obstacles.forEach((o, index) => {
                o.x -= 10;
                drawAscii(o.type, o.x, o.y);
                
                // Collision
                if (o.x < 140 && o.x > 80 && playerY > canvas.height - 180) {
                    gameOver();
                }
                
                if (o.x < -50) obstacles.splice(index, 1);
            });

            drawAscii(HERO, 100, playerY);
            score++;
            ctx.fillStyle = "#33ff33";
            ctx.font = '24px Courier New';
            ctx.fillText("SCORE: " + Math.floor(score / 10), 50, 50);
            
            frame++;
            requestAnimationFrame(update);
        }

        function gameOver() {
            gameState = 'OVER';
            ui.classList.remove('hidden');
            ui.innerHTML = `<h1 class="text-6xl text-red-500 font-bold">GAME OVER</h1>
                            <p class="text-2xl mt-4">FINAL SCORE: ${Math.floor(score / 10)}</p>
                            <button onclick="location.reload()" class="mt-8 px-6 py-2 bg-green-900 border border-green-400 pointer-events-auto">RESTART</button>`;
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Enter' && gameState !== 'PLAYING') {
                gameState = 'PLAYING';
                ui.classList.add('hidden');
                update();
            }
            if (e.code === 'Space' && gameState === 'PLAYING' && playerY >= canvas.height - 150) {
                vy = JUMP_FORCE;
            }
        });
    </script>
</body>
</html>
